services:
  app:
    build: .
    container_name: scripture-showdown
    ports:
      - "3000:3000"
    volumes:
      - game-data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/data/scripture-showdown.db

volumes:
  game-data:
    name: scripture-showdown-data
    external: true
